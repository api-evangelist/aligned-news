naftiko: 1.0.0-alpha2
info:
  label: Aligned News REST API — News Feed
  description: 'Aligned News REST API — News Feed. 1 operations. Lead operation: Get News Feed. Self-contained Naftiko capability
    covering one Aligned News business surface.'
  tags:
  - Aligned News
  - News Feed
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ALIGNED_NEWS_API_KEY: ALIGNED_NEWS_API_KEY
capability:
  consumes:
  - type: http
    namespace: aligned-news-news-feed
    baseUri: https://alignednews.com/v1
    description: Aligned News REST API — News Feed business capability. Self-contained, no shared references.
    resources:
    - name: news-feed
      path: /news-feed
      operations:
      - name: getnewsfeed
        method: GET
        description: Get News Feed
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Maximum number of stories per section.
    authentication:
      type: bearer
      token: '{{env.ALIGNED_NEWS_API_KEY}}'
  exposes:
  - type: rest
    namespace: aligned-news-news-feed-rest
    port: 8080
    description: REST adapter for Aligned News REST API — News Feed. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/news-feed
      name: news-feed
      description: REST surface for news-feed.
      operations:
      - method: GET
        name: getnewsfeed
        description: Get News Feed
        call: aligned-news-news-feed.getnewsfeed
        with:
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: aligned-news-news-feed-mcp
    port: 9090
    transport: http
    description: MCP adapter for Aligned News REST API — News Feed. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-news-feed
      description: Get News Feed
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: aligned-news-news-feed.getnewsfeed
      with:
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
