naftiko: 1.0.0-alpha2
info:
  label: Aligned News
  description: >-
    Aligned News REST API consumer capability. Exposes the Stories, Signals,
    Reports, Bundles, Sections, News Feed, and Search endpoints under the
    https://alignednews.com/v1 base. Authentication is a single Bearer API key
    (alnw_) issued to Pro and Enterprise subscribers.
  tags:
    - Aligned News
    - AI
    - News
    - Intelligence
    - Signals
    - Search
  created: '2026-05-06'
  modified: '2026-05-06'
binds:
  - namespace: env
    keys:
      ALIGNED_NEWS_API_KEY: ALIGNED_NEWS_API_KEY
capability:
  consumes:
    - type: http
      namespace: aligned-news
      baseUri: https://alignednews.com
      description: Aligned News REST API
      authentication:
        type: bearer
        token: '{{env.ALIGNED_NEWS_API_KEY}}'
      resources:
        - name: stories
          path: /v1/stories
          description: AI news stories
          operations:
            - name: listStories
              method: GET
              path: /v1/stories
              description: List recent AI news stories
              inputParameters:
                - name: section
                  in: query
                  type: string
                  required: false
                  description: Filter by section slug
                - name: tag
                  in: query
                  type: string
                  required: false
                  description: Filter by tag
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Maximum results (default 20, max 100)
              outputRawFormat: json
            - name: getStory
              method: GET
              path: /v1/stories/{id}
              description: Get a single story with full body
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: Story UUID
              outputRawFormat: json
        - name: signals
          path: /v1/signals
          description: AI signals (early pattern detections)
          operations:
            - name: listSignals
              method: GET
              path: /v1/signals
              description: List recent AI signals
              inputParameters:
                - name: badge
                  in: query
                  type: string
                  required: false
                  description: Filter by badge (bullish, caution, critical, signal,
                    interview, vc, action)
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Maximum results (default 50, max 200)
              outputRawFormat: json
            - name: getSignal
              method: GET
              path: /v1/signals/{id}
              description: Get a single signal with analysis and related stories
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: Signal UUID
              outputRawFormat: json
        - name: reports
          path: /v1/reports
          description: AI trend reports
          operations:
            - name: listReports
              method: GET
              path: /v1/reports
              description: List recent reports (summaries only)
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Maximum results
              outputRawFormat: json
            - name: getReport
              method: GET
              path: /v1/reports/{id}
              description: Get a single report with full content
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: Report UUID
              outputRawFormat: json
        - name: bundles
          path: /v1/bundles
          description: Curated bundles of related stories
          operations:
            - name: listBundles
              method: GET
              path: /v1/bundles
              description: List bundles
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Maximum results
              outputRawFormat: json
            - name: getBundle
              method: GET
              path: /v1/bundles/{id}
              description: Get a single bundle with all stories
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: Bundle UUID
              outputRawFormat: json
        - name: sections
          path: /v1/sections
          description: News sections
          operations:
            - name: listSections
              method: GET
              path: /v1/sections
              description: List active news sections
              outputRawFormat: json
        - name: news-feed
          path: /v1/news-feed
          description: All current stories grouped by section
          operations:
            - name: getNewsFeed
              method: GET
              path: /v1/news-feed
              description: Get the news feed grouped by section
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Maximum stories per section
              outputRawFormat: json
        - name: search
          path: /v1/search
          description: Full-text search across stories, signals, and reports
          operations:
            - name: searchContent
              method: GET
              path: /v1/search
              description: Search across stories, signals, and reports
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: true
                  description: Search query (min 2 chars)
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Maximum results per type
              outputRawFormat: json
