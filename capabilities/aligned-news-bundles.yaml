naftiko: 1.0.0-alpha2
info:
  label: Aligned News REST API — Bundles
  description: 'Aligned News REST API — Bundles. 2 operations. Lead operation: List Bundles. Self-contained Naftiko capability
    covering one Aligned News business surface.'
  tags:
  - Aligned News
  - Bundles
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ALIGNED_NEWS_API_KEY: ALIGNED_NEWS_API_KEY
capability:
  consumes:
  - type: http
    namespace: aligned-news-bundles
    baseUri: https://alignednews.com/v1
    description: Aligned News REST API — Bundles business capability. Self-contained, no shared references.
    resources:
    - name: bundles
      path: /bundles
      operations:
      - name: listbundles
        method: GET
        description: List Bundles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Maximum number of bundles to return.
    - name: bundles-id
      path: /bundles/{id}
      operations:
      - name: getbundle
        method: GET
        description: Get Bundle
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ALIGNED_NEWS_API_KEY}}'
  exposes:
  - type: rest
    namespace: aligned-news-bundles-rest
    port: 8080
    description: REST adapter for Aligned News REST API — Bundles. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/bundles
      name: bundles
      description: REST surface for bundles.
      operations:
      - method: GET
        name: listbundles
        description: List Bundles
        call: aligned-news-bundles.listbundles
        with:
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/bundles/{id}
      name: bundles-id
      description: REST surface for bundles-id.
      operations:
      - method: GET
        name: getbundle
        description: Get Bundle
        call: aligned-news-bundles.getbundle
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: aligned-news-bundles-mcp
    port: 9090
    transport: http
    description: MCP adapter for Aligned News REST API — Bundles. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-bundles
      description: List Bundles
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: aligned-news-bundles.listbundles
      with:
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: get-bundle
      description: Get Bundle
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: aligned-news-bundles.getbundle
      outputParameters:
      - type: object
        mapping: $.
