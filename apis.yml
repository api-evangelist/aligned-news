aid: aligned-news
name: Aligned News
description: >-
  Aligned News is an AI-native intelligence and news platform that synthesizes AI-powered briefings from 63 curated X
  lists tracking 100,000+ accounts in AI, tech, and science, and publishes Stories, Signals, Reports, and Bundles via
  web, REST API, and a downloadable MCP server for AI tools like Claude, Cursor, and Windsurf.
