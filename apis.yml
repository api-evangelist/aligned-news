  - aid: aligned-news:aligned-news-mcp-server
    name: Aligned News MCP Server
    description: >-
      Reference Model Context Protocol server distributed as a single TypeScript file (mcp-server.ts) that proxies the
      Aligned News REST API to MCP-compatible AI tools like Claude Code, Claude Desktop, Cursor, and Windsurf. Exposes
      search_news, get_stories, get_story, get_signals, get_signal, get_reports, get_report, and get_sections tools,
      plus an aligned://news-feed resource. Authenticates with a user-provided ALIGNED_API_KEY (Bearer alnw_...).
    humanURL: https://alignednews.com/developers
